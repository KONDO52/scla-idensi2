<script>
const hist = [];
const screenEl = document.getElementById('screen');
const debugEl = document.getElementById('debug');
const histEl = document.getElementById('history');

function goTo(id) {
  if (!screens[id]) {
    document.getElementById('popup-title').textContent = id + '（未実装）';
    document.getElementById('popup-msg').textContent = 'この画面はPhase 2以降で実装予定です。\n画面ID: ' + id;
    document.getElementById('popup').classList.add('show');
    return;
  }
  hist.push(id);
  window._currentScreen = id;
  debugEl.textContent = id;
  histEl.innerHTML = '遷移履歴<br>' + hist.slice(-10).map(h => '<span style="color:#E8BD54">' + h + '</span>').join(' → ');
  screenEl.style.opacity = 0;
  setTimeout(() => {
    screenEl.innerHTML = screens[id]();
    screenEl.scrollTop = 0;
    screenEl.style.opacity = 1;
    if (id === 'S-060c') {
      setTimeout(() => { if (window._currentScreen === 'S-060c') goTo('S-060d'); }, 3000);
    }
  }, 80);
}

function goBack() {
  if (hist.length > 1) { hist.pop(); goTo(hist.pop()); }
}

function closePopup() { document.getElementById('popup').classList.remove('show'); }

// ================================================================
// スコア計算エンジン（確定ロジック）
// ================================================================

// ユーザープロフィール（デモ用デフォルト値）
// 登録フロー用の一時データ
if (!window._regData) window._regData = {
  email:'aaa@test.com', password:'1111',
  nickname:'', age:null, sex:null, height:null, weight:null,
  isPregnant:false, bmi:null,
  activity:'normal', // low/normal/high
  goalWeight:null, pace:2,
  isAigeno:null, // true/false
  aigenoId:'admin', aigenoPw:'1111',
  exercisePlan:'active', // inactive/active/gachi
  surveyAnswers:[], surveyType:null, surveyIntensity:null,
  bmr:null, tdee:null, targetKcal:null,
  pfcPct:null, pfcGrams:null,
  wagamamaEnabled:null, // OK/NG
};

// PFC%決定表（非AIGENO 9パターン）
const pfcTable = {
  '糖質過多・弱':  {p:19.0, f:25.0, c:56.0},
  '糖質過多・中':  {p:20.0, f:26.5, c:53.5},
  '糖質過多・強':  {p:20.0, f:30.0, c:50.0},
  '脂質過多・弱':  {p:18.5, f:23.0, c:58.5},
  '脂質過多・中':  {p:20.0, f:21.5, c:58.5},
  '脂質過多・強':  {p:20.0, f:20.0, c:60.0},
  '両方過多・弱':  {p:18.0, f:23.5, c:58.5},
  '両方過多・中':  {p:19.5, f:22.0, c:58.5},
  '両方過多・強':  {p:20.0, f:20.0, c:60.0},
  'バランス型':    {p:17.0, f:25.0, c:58.0}, // 対象外相当だが計算用
};

// AIGENO固定タイプ（30代女性 / P利用効率中 / 炎症普通 / 満腹感なし）
const aigenoFixedType = {
  p:19.0, f:25.0, c:56.0,
  fiber: 18*1.0,  // 満腹感リスクなし
  saltMax: 6.25,  // 炎症リスク普通（女性）
  description:'タンパク質利用効率: 中 / 炎症感受性: 普通 / 満腹感リスク: なし'
};

// BMR計算（Ganpule式）
function calcBMR(sex, weight, height, age) {
  if (sex === 'male') {
    return Math.round(((0.0481*weight + 0.0234*height - 0.0138*age - 0.4235) * 1000) / 4.186);
  } else {
    return Math.round(((0.0481*weight + 0.0234*height - 0.0138*age - 0.9708) * 1000) / 4.186);
  }
}

// TDEE = BMR × PAL
function calcTDEE(bmr, activity) {
  const pal = activity==='low'?1.50 : activity==='high'?2.00 : 1.75;
  return Math.round(bmr * pal);
}

// 目標カロリー（ダブルガード）
function calcTargetKcal(tdee, bmr, sex, currentWeight, goalWeight, days) {
  const deficit = ((currentWeight - goalWeight) * 7200) / days;
  const raw = tdee - deficit;
  const floor = sex==='male' ? 1400 : 1200;
  return { target: Math.max(raw, Math.max(bmr, floor)), deficit, floor };
}

// アンケート15問定義
const surveyQs = [
  // 糖質リスク（0-4）
  {sec:'糖質',q:'毎回の食事で、ご飯大盛りやパン2枚以上など主食をしっかり食べないと気が済まない？'},
  {sec:'糖質',q:'ラーメン・うどん・パスタなど「麺類のみ」で食事を済ませることが多い？'},
  {sec:'糖質',q:'砂糖入りのコーヒー・紅茶・ジュース・エナジードリンクを日常的に飲む？'},
  {sec:'糖質',q:'食後や間食に、和菓子・チョコレート・グミなどを食べる習慣がある？'},
  {sec:'糖質',q:'ビール・日本酒・甘いサワーやカクテルをよく飲む？'},
  // 脂質リスク（5-9）
  {sec:'脂質',q:'唐揚げ・とんかつ・フライドポテトなどの揚げ物をよく食べる？'},
  {sec:'脂質',q:'お肉はバラ肉・ひき肉・霜降りなど脂が多い部位が好き？'},
  {sec:'脂質',q:'スナック菓子や洋菓子（ケーキ・クッキー・アイス）をよく食べる？'},
  {sec:'脂質',q:'サラダにドレッシング・マヨネーズをたっぷり、パンにバターたっぷり？'},
  {sec:'脂質',q:'コンビニ弁当・外食・ファストフードで食事を済ませる頻度が高い？'},
  // タンパク質不足リスク（10-14）※PFC計算には使わない
  {sec:'タンパク質',q:'毎回の食事で「手のひらサイズ」の肉・魚・豆腐・卵のいずれかが【無い】ことが多い？'},
  {sec:'タンパク質',q:'「朝食はパンとコーヒーだけ」等、タンパク質がない食事が基本？'},
  {sec:'タンパク質',q:'肉や魚よりも、野菜や炭水化物中心の食事を好む？'},
  {sec:'タンパク質',q:'卵や乳製品を【食べない】日が多い？'},
  {sec:'タンパク質',q:'プロテインやギリシャヨーグルトなど高タンパク製品を【摂らない】？'},
];

// アンケート判定 → タイプ決定
function analyzeSurvey(answers) {
  const sugar = answers.slice(0,5).reduce((a,b)=>a+b,0);
  const fat = answers.slice(5,10).reduce((a,b)=>a+b,0);
  const protein = answers.slice(10,15).reduce((a,b)=>a+b,0);
  let type;
  if (sugar >= 7 && fat >= 7) type = '両方過多';
  else if (sugar > fat && sugar >= 4) type = '糖質過多';
  else if (fat > sugar && fat >= 4) type = '脂質過多';
  else if (sugar >= 4 && sugar === fat) type = '両方過多';
  else type = 'バランス型';

  let intensity = null;
  if (type === '糖質過多') intensity = sugar <= 7 ? '弱' : sugar <= 11 ? '中' : '強';
  else if (type === '脂質過多') intensity = fat <= 7 ? '弱' : fat <= 11 ? '中' : '強';
  else if (type === '両方過多') { const s = Math.max(sugar,fat); intensity = s <= 7 ? '弱' : s <= 11 ? '中' : '強'; }
  return { type, intensity, sugar, fat, protein };
}

const userProfile = {
  name: '近藤',  // ユーザー名
  rewardPoints: 1250,  // リワードポイント
  type: '糖質過多・中',  // アンケート結果
  dailyIdeal: { kcal: 1650, p: 80, f: 46, sugar: 158, fiber: 22, salt: 7.5 },
  mealRatio: { breakfast: 0.25, lunch: 0.35, dinner: 0.35, snack: 0.05 },
  isAigeno: false,
  satietyRisk: 'none',   // none / moderate / high
  inflammationRisk: 'none', // none / moderate / high
};

// weight定義
function getWeights(profile) {
  // 2026-04-15 ステージ1改訂（Gemini+Claudeレビュー反映）
  // カロリー 0.40 維持、繊維 0.08→0.12 に引き上げ（満腹感重視）
  let w = { kcal: 0.40, p: 0.30, f: 0.12, sugar: 0.10, fiber: 0.12 };
  // 弱点補正（非AIGENO: アンケート由来）
  if (profile.type.includes('糖質過多・弱')) w.sugar *= 1.3;
  else if (profile.type.includes('糖質過多・中')) w.sugar *= 1.6;
  else if (profile.type.includes('糖質過多・強')) w.sugar *= 2.0;
  if (profile.type.includes('脂質過多・弱')) w.f *= 1.3;
  else if (profile.type.includes('脂質過多・中')) w.f *= 1.6;
  else if (profile.type.includes('脂質過多・強')) w.f *= 2.0;
  if (profile.type.includes('両方過多')) { w.sugar *= 1.5; w.f *= 1.5; }
  // AIGENO補正（食物繊維のみ。塩分はスコア対象外）
  if (profile.satietyRisk === 'moderate') w.fiber *= 1.5;
  else if (profile.satietyRisk === 'high') w.fiber *= 2.0;
  return w;
}

// 1食の理想値を取得
function getMealIdeal(mealType) {
  const r = userProfile.mealRatio[mealType] || 0.35;
  const d = userProfile.dailyIdeal;
  return { kcal: d.kcal*r, p: d.p*r, f: d.f*r, sugar: d.sugar*r, fiber: d.fiber*r, salt: d.salt*r };
}

// スコア計算（1食 or 1日）
// 2026-04-15 ステージ1改訂（Gemini+Claudeレビュー反映）:
//  - 案B（max下限方式）: 大幅逸脱時は max(個人weight×ブースト, 共通下限)
//  - カロリー不足ペナルティ: 理想の60%未満で減点
//  - P不足40%超でブースト
//  - 複数軸同時逸脱（3軸以上50%超）で追加-10点
function calcScore(actual, ideal) {
  const w = getWeights(userProfile);
  let penalty = 0;
  let majorDeviationAxes = 0; // 50%超逸脱の軸数カウント

  // ヘルパー: max下限方式でweight決定
  // GAP≥50%時は max(個人weight×boost, 共通下限) を適用
  const effWeight = (gap, baseW, boostMult, commonFloor) => {
    if (gap >= 50) return Math.max(baseW * boostMult, commonFloor);
    return baseW;
  };

  // カロリー: 超過時のみペナルティ（ブーストなし、元weight 0.40が十分強い）
  if (actual.kcal > ideal.kcal) {
    const gap = (actual.kcal - ideal.kcal) / ideal.kcal * 100;
    penalty += gap * w.kcal; // カロリーは個人weight固定
    if (gap >= 50) majorDeviationAxes++;
  }

  // カロリー不足ペナルティ: 理想の60%未満（40%超不足）で発火（摂食障害防止セーフガード）
  if (actual.kcal < ideal.kcal * 0.6 && actual.kcal > 0) {
    const gap = (ideal.kcal - actual.kcal) / ideal.kcal * 100;
    penalty += gap * 0.30; // 不足専用weight 0.30
  }

  // P: 不足時ペナルティ、40%超不足でブースト（共通下限0.24）
  if (actual.p < ideal.p) {
    const gap = (ideal.p - actual.p) / ideal.p * 100;
    const eff = gap >= 40 ? Math.max(w.p, 0.24) : w.p;
    penalty += gap * eff;
    if (gap >= 50) majorDeviationAxes++;
  }

  // F: 超過時、GAP≥50%で max(個人w×1.5, 0.24)
  if (actual.f > ideal.f) {
    const gap = (actual.f - ideal.f) / ideal.f * 100;
    penalty += gap * effWeight(gap, w.f, 1.5, 0.24);
    if (gap >= 50) majorDeviationAxes++;
  }

  // 糖質: 超過時、GAP≥50%で max(個人w×1.5, 0.20)
  if (actual.sugar > ideal.sugar) {
    const gap = (actual.sugar - ideal.sugar) / ideal.sugar * 100;
    penalty += gap * effWeight(gap, w.sugar, 1.5, 0.20);
    if (gap >= 50) majorDeviationAxes++;
  }

  // 食物繊維: 不足時、GAP≥50%で max(個人w×2.0, 0.18)
  if (actual.fiber < ideal.fiber) {
    const gap = (ideal.fiber - actual.fiber) / ideal.fiber * 100;
    penalty += gap * effWeight(gap, w.fiber, 2.0, 0.18);
    if (gap >= 50) majorDeviationAxes++;
  }

  // 複数軸同時逸脱ボーナスペナルティ: 3軸以上で50%超逸脱 → 追加-10点
  if (majorDeviationAxes >= 3) {
    penalty += 10;
  }

  // 塩分はスコア対象外（コンシェルジュ層で対応）
  return Math.max(0, Math.round(100 - penalty));
}

// 大幅逸脱の検出（警告メッセージ生成用）
function detectDeviations(actual, ideal) {
  const warnings = [];
  if (actual.kcal > ideal.kcal * 1.5) warnings.push({axis:'カロリー',type:'over',pct:Math.round((actual.kcal/ideal.kcal-1)*100),msg:`カロリーが理想の${Math.round(actual.kcal/ideal.kcal*100)}%。明日は軽めでリセットしよう`});
  if (actual.kcal < ideal.kcal * 0.6 && actual.kcal > 0) warnings.push({axis:'カロリー不足',type:'under',pct:Math.round((1-actual.kcal/ideal.kcal)*100),msg:`食べなさすぎ！理想の${Math.round(actual.kcal/ideal.kcal*100)}%しか食べてない。代謝が落ちて逆に痩せにくくなるよ`});
  if (actual.p < ideal.p * 0.6) warnings.push({axis:'P不足',type:'under',pct:Math.round((1-actual.p/ideal.p)*100),msg:`タンパク質が半分以下。筋肉が減って基礎代謝が落ちるよ。鶏むね・プロテインを追加しよう`});
  if (actual.f > ideal.f * 1.5) warnings.push({axis:'脂質',type:'over',pct:Math.round((actual.f/ideal.f-1)*100),msg:`脂質が理想の${Math.round(actual.f/ideal.f*100)}%。明日は揚げ物・バター控えめに`});
  if (actual.sugar > ideal.sugar * 1.5) warnings.push({axis:'糖質',type:'over',pct:Math.round((actual.sugar/ideal.sugar-1)*100),msg:`糖質が理想の${Math.round(actual.sugar/ideal.sugar*100)}%。血糖値スパイクに注意`});
  if (actual.fiber < ideal.fiber * 0.5) warnings.push({axis:'食物繊維',type:'under',pct:Math.round((1-actual.fiber/ideal.fiber)*100),msg:`食物繊維が半分以下。明日はサラダ or 野菜スープを1品追加しよう`});
  return warnings;
}

// 「ー」判定: カロリーが理想の70%以下→「ー」（貯金）
// 70%超〜100%以下は「理想範囲内」としてスコア表示する
function isDash(actualKcal, mealType) {
  const ideal = getMealIdeal(mealType);
  return actualKcal <= ideal.kcal * 0.7;
}

// コンビニカートに追加（予算チェック付き）
function addToCart(name) {
  if (!window._cart) window._cart = new Set();
  if (window._cart.has(name)) {
    window._cart.delete(name);
    goTo('S-052c');
    return;
  }
  const budgetMax = getBudgetMax();
  if (budgetMax < 9999) {
    const currentTotal = getCartTotalPrice(window._cart);
    const itemPrice = getCartTotalPrice(new Set([name]));
    if (currentTotal + itemPrice > budgetMax) {
      alert(budgetMax + '円を超えてしまいます！\n\n現在の合計: ¥' + currentTotal + '\nこの商品: ¥' + itemPrice + '\n合計: ¥' + (currentTotal + itemPrice));
      return;
    }
  }
  window._cart.add(name);
  goTo('S-052c');
}

// カートの合計栄養素を計算（Set or Map対応）
function getCartNutrition(cart) {
  const total = {kcal:0,p:0,f:0,sugar:0,fiber:0,salt:0};
  if (cart instanceof Map) {
    cart.forEach((qty, name) => {
      const n = menuNutrition[name];
      if (n && qty > 0) { Object.keys(total).forEach(k => total[k] += n[k] * qty); }
    });
  } else {
    cart.forEach(name => {
      const n = menuNutrition[name];
      if (n) { Object.keys(total).forEach(k => total[k] += n[k]); }
    });
  }
  return total;
}

// カートのスコアを計算（1食として）
function getCartScore(cart, mealType) {
  const actual = getCartNutrition(cart);
  const ideal = getMealIdeal(mealType || 'lunch');
  if (actual.kcal === 0) return {score: '-', actual, ideal, isDash: true};
  if (actual.kcal <= ideal.kcal * 0.7) return {score: '-', actual, ideal, isDash: true};
  return {score: calcScore(actual, ideal), actual, ideal, isDash: false};
}

// 未記録の食事をカウント
function getMissingMeals() {
  const missing = [];
  const today = new Date();
  const log0 = window._dayLog || {};
  // 今日の未記録
  ['breakfast','lunch','dinner'].forEach(m => {
    if (!log0[m]) {
      const mealLabel = m==='breakfast'?'朝食':m==='lunch'?'昼食':'夕食';
      missing.push({day:0, date:formatPastDate(0), meal:m, mealLabel});
    }
  });
  // 過去
  for (let d = 1; d <= 6; d++) {
    const log = window._pastLogs[d] || {};
    ['breakfast','lunch','dinner'].forEach(m => {
      if (!log[m]) {
        const mealLabel = m==='breakfast'?'朝食':m==='lunch'?'昼食':'夕食';
        missing.push({day:d, date:formatPastDate(d), meal:m, mealLabel});
      }
    });
  }
  return missing;
}

// わがままモード: 直近7日間の平均スコアが70点以上で解放
function getWeeklyAvgScore() {
  // デモ用: 過去の記録からスコアを計算
  const scores = [];
  for (let d = 1; d <= 6; d++) {
    const log = window._pastLogs[d] || {};
    ['breakfast','lunch','dinner'].forEach(m => {
      if (log[m]) {
        const ideal = getMealIdeal(m);
        if (log[m].kcal > ideal.kcal * 0.7) {
          scores.push(calcScore(log[m], ideal));
        }
      }
    });
  }
  // 今日の記録も含む
  const todayLog = window._dayLog || {};
  ['breakfast','lunch','dinner'].forEach(m => {
    if (todayLog[m]) {
      const ideal = getMealIdeal(m);
      if (todayLog[m].kcal > ideal.kcal * 0.7) {
        scores.push(calcScore(todayLog[m], ideal));
      }
    }
  });
  return scores.length > 0 ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) : 0;
}
function isWagamamaAvailable() { return getWeeklyAvgScore() >= 70; }

function formatPastDate(daysAgo) {
  const d = new Date(); d.setDate(d.getDate() - daysAgo);
  return (d.getMonth()+1)+'/'+d.getDate();
}

// 食事確定時にカート内容も保存する
function saveMealWithCart(mealType, cart, source) {
  const nutrition = getCartNutrition(cart);
  nutrition._cart = {};
  nutrition._source = source; // 'conveni' or 'gaishoku' or 'jisui'
  if (cart instanceof Map) {
    cart.forEach((qty, name) => { nutrition._cart[name] = qty; });
  } else {
    cart.forEach(name => { nutrition._cart[name] = 1; });
  }
  window._dayLog[mealType] = nutrition;
  // 保存完了後、次の食事記録に備えてカート・ブランド・フィルタを初期化
  resetMealSelectionState();
}

// 食事選択の一時状態を全リセット（コンビニ・外食・自炊のカート、ブランド、フィルタ）
function resetMealSelectionState() {
  window._cart = new Set();
  window._gaishokuCart = new Map();
  window._jisuiCart = new Map();
  window._convBrand = null;
  window._gaishokuBrand = null;
  window._filter = null;

  window._jisuiTab = '全て';

// 食事修正: 保存されたカートを復元して選択画面に戻る
function editMeal(mealType) {
  const data = window._dayLog[mealType];
  if (!data || !data._cart) {
    window._dayLog[mealType] = null;
    goTo('S-051');
    return;
  }
  const source = data._source || 'conveni';
  if (source === 'gaishoku') {
    window._gaishokuCart = new Map();
    Object.entries(data._cart).forEach(([name, qty]) => { window._gaishokuCart.set(name, qty); });
    window._gaishokuTab = '全て';
    goTo('S-055');
  } else if (source === 'jisui') {
    window._jisuiCart = new Map();
    Object.entries(data._cart).forEach(([name, qty]) => { window._jisuiCart.set(name, qty); });
    window._jisuiTab = '全て';
    goTo('S-020a');
  } else {
    window._cart = new Set(Object.keys(data._cart));
    goTo('S-052c');
  }
}

// 自炊カート操作（Map: 名前→数量）
function jisuiAdd(name) {
  if (!window._jisuiCart) window._jisuiCart = new Map();
  const qty = window._jisuiCart.get(name) || 0;
  window._jisuiCart.set(name, qty + 1);
  goTo('S-020a');

  if (!window._jisuiCart) return;

// 個別メニュー用スコア（常に数値を返す、ー表示なし）
function getMenuScore(name, mealType) {
  const n = menuNutrition[name];
  if (!n) return 50;
  const ideal = getMealIdeal(mealType || 'lunch');
  return calcScore(n, ideal);
}

// 単品スコア（この1品だけで1食にした場合）
function getSingleScore(name, mealType) {
  const n = menuNutrition[name];
  if (!n) return 0;
  const ideal = getMealIdeal(mealType || 'lunch');
  if (n.kcal <= ideal.kcal * 0.7) return '-'; // 「ー」（理想の70%以下は貯金）
  return calcScore(n, ideal);
}

// snacks = [{name:'チョコレート',qty:1,kcal:280}, {name:'缶コーヒー（加糖）',qty:3,kcal:210}, ...]
function getSnackTotal() {
  const snacks = window._dayLog.snacks || [];
  const total = {kcal:0,p:0,f:0,sugar:0,fiber:0,salt:0};
  snacks.forEach(s => {
    const n = menuNutrition[s.name];
    if (n) Object.keys(total).forEach(k => total[k] += n[k] * s.qty);
  });
  return total;
}
function addSnack(name, qty) {
  if (!window._dayLog.snacks) window._dayLog.snacks = [];
  const existing = window._dayLog.snacks.find(s => s.name === name);
  if (existing) existing.qty += qty;
  else window._dayLog.snacks.push({name, qty, kcal: (menuNutrition[name]?.kcal || 0) * qty});
  goTo('S-050k');
}
function removeSnack(name) {
  if (!window._dayLog.snacks) return;
  window._dayLog.snacks = window._dayLog.snacks.filter(s => s.name !== name);
  goTo('S-050k');
}

screens['S-057'] = () => {
  const log = window._dayLog || {};

  const actual = log[mealType] || getCartNutrition(
    window._cart || window._gaishokuCart || window._jisuiCart || new Set()
  );
  const ideal = getMealIdeal(mealType);
  const dash = actual.kcal <= ideal.kcal * 0.7;
  const score = dash ? '-' : calcScore(actual, ideal);
  // PFC差分
  const pDiff = actual.p - ideal.p;
  const fDiff = actual.f - ideal.f;
  const sugarDiff = actual.sugar - ideal.sugar;
  const fiberDiff = actual.fiber - ideal.fiber;

  // 貯金フォローメッセージ: 現在の食事より前の食事枠に貯金があるか
  const orderPrev = { breakfast: [], lunch: ['breakfast'], dinner: ['breakfast','lunch'] };
  const prevMeals = orderPrev[mealType] || [];
  const hasSavings = prevMeals.some(m =>
    log[m] && log[m].kcal <= getMealIdeal(m).kcal * 0.7
  );
  const savingsLabel = prevMeals.filter(m => log[m] && log[m].kcal <= getMealIdeal(m).kcal * 0.7)

    followMsg = '素晴らしい選択！P確保＋カロリー管理ができてる💪';

  } else {

    const dateStr = (dt.getMonth()+1)+'/'+dt.getDate();
    const dayLabel = d===1?'昨日':d===2?'一昨日':dateStr;
    const meals = ['breakfast','lunch','dinner'].map(m => {

      const recorded = !!log[m];

    dayRows.push({d, dateStr, dayLabel, meals, missingCount});

// わがまま使用を取り消す: DBからkcal/PFCもリセット、履歴削除、カウント復元
function cancelWagamama() {
  if (!confirm('わがまま使用を取り消しますか？\n\n・食事記録のカロリー・PFCは全てリセット（0）されます\n・使用カウントが戻ります（月3回の枠に復元）\n・この食事枠は「未記録」状態に戻ります')) return;
  const slot = ['breakfast','lunch','dinner','midnight'].find(k => window._dayLog?.[k]?.isWagamama);
  // 🛡️ 二重減算防止ガード: isWagamamaフラグが実際に立っている場合のみ処理
  if (!slot) { alert('わがまま使用の記録が見つかりません（既に取消済み or 未使用）'); return; }
  const today = new Date().toISOString().slice(0,10);
  // 🛡️ 念のため: 当該履歴が実在するか検証（実在しなければカウント戻さない）
  const hadHistory = (window._wagamamaHistory || []).some(h => h.date === today && h.slot === slot);
  // 1. _dayLogから該当枠を完全削除（kcal/PFC二重集計防止の核心）
  window._dayLog[slot] = null;
  // 2. わがまま履歴から当日分を削除
  if (window._wagamamaHistory) {
    window._wagamamaHistory = window._wagamamaHistory.filter(h => !(h.date === today && h.slot === slot));
  }
  // 3. 選択状態をクリア
  window._wagamamaSlot = null;
  // 4. 月間カウント復元（🛡️ 履歴が実在した場合のみ -1。Math.maxで負数ガード）
  if (hadHistory && typeof window._wagamamaMonthCount === 'number') {
    window._wagamamaMonthCount = Math.max(0, window._wagamamaMonthCount - 1);
  }
  alert('✅ わがまま使用を取り消しました。\nカロリー記録はリセット、使用カウントも戻りました。');
  goTo('S-050');
}

// ペース更新＋AIアドバイス（外部関数化）
window._regUpdatePace = function() {
  var d = window._regData;
  var gw = parseFloat(document.getElementById('regGW').value);
  var days = parseInt(document.getElementById('regDays').value);
  var advBox = document.getElementById('aiAdvice');
  var advText = document.getElementById('aiAdviceText');
  var fixBtn = document.getElementById('aiFixBtn');
  if (!advBox) return;
  advBox.style.display = 'none';
  fixBtn.style.display = 'none';
  if (!isNaN(gw) && !isNaN(days) && days > 0 && d.weight) {
    var loss = d.weight - gw;
    var pace = loss / (days/30);
    var daily = (loss * 7200) / days;
    document.getElementById('paceValue').textContent = '月 ' + pace.toFixed(1) + 'kg';
    document.getElementById('paceNote').textContent = '1日あたり約' + Math.round(daily) + 'kcalの赤字';
    var box = document.getElementById('paceResult');
    var recommendedDays = Math.max(30, Math.round(loss / 2 * 30));
    if (pace > 3) {
      box.style.background = '#FEE2E2'; box.style.borderColor = '#DC2626';
      document.getElementById('paceValue').style.color = '#DC2626';
      advBox.style.display = 'block'; advBox.style.background = '#FEE2E2'; advBox.style.borderColor = '#DC2626';
      advText.style.color = '#991B1B';
      advText.innerHTML = '月' + pace.toFixed(1) + 'kgは速すぎるペース！筋肉が落ちてリバウンドしやすくなるよ。<br><strong>' + recommendedDays + '日（月2kgペース）</strong>に変更するのがおすすめだよ。';
      fixBtn.style.display = 'inline-block';
      window._regSuggestDays = recommendedDays;
    } else if (pace > 2) {
      box.style.background = '#FFF7ED'; box.style.borderColor = '#FF6B1A';
      document.getElementById('paceValue').style.color = '#FF6B1A';
      advBox.style.display = 'block'; advBox.style.background = '#FEF9C3'; advBox.style.borderColor = '#EAB308';
      advText.style.color = '#92400E';
      advText.innerHTML = '月' + pace.toFixed(1) + 'kgは少し急ぎ足かも。無理なく続けるには<strong>月2kgペース（' + recommendedDays + '日）</strong>がおすすめ。';
      fixBtn.style.display = 'inline-block';
      window._regSuggestDays = recommendedDays;
    } else if (pace < 0.3) {
      box.style.background = '#DBEAFE'; box.style.borderColor = '#2563EB';
      document.getElementById('paceValue').style.color = '#2563EB';
      advBox.style.display = 'block'; advBox.style.background = '#DBEAFE'; advBox.style.borderColor = '#2563EB';
      advText.style.color = '#1E40AF';
      advText.innerHTML = 'ペースが緩やかすぎるかも。習慣化には最低<strong>月0.5kgペース</strong>がおすすめ。';
    } else {
      box.style.background = '#DCFCE7'; box.style.borderColor = '#16A34A';
      document.getElementById('paceValue').style.color = '#16A34A';
    }
  }
};
window._regApplyFix = function() {
  if (window._regSuggestDays) {
    document.getElementById('regDays').value = window._regSuggestDays;
    window._regUpdatePace();
  }
};

// S-013: ダブルガード＋計算結果
screens['S-013'] = () => {
  const d = window._regData;
  d.bmr = calcBMR(d.sex, d.weight, d.height, d.age);
  d.tdee = calcTDEE(d.bmr, 'normal'); // デフォルトで普通
  const desiredDays = d.goalDays || Math.round((d.weight - d.goalWeight) / (d.pace||2) * 30);
  const result = calcTargetKcal(d.tdee, d.bmr, d.sex, d.weight, d.goalWeight, desiredDays);
  d.targetKcal = Math.round(result.target);
  d.deficit = Math.round(result.deficit);
  // ダブルガードが効いた場合
  const guarded = (d.tdee - result.deficit) < Math.max(d.bmr, result.floor);
  const adjustedDays = guarded ? Math.round((d.weight - d.goalWeight) * 7200 / (d.tdee - d.targetKcal)) : desiredDays;
  return `
  ${header(guarded?'ダブルガード通知':'目標カロリー確認', guarded?'#FF6B1A':'#16A34A')}
  <div class="content" style="text-align:center;padding-top:16px">
    ${guarded ? `
      <div style="font-size:36px;margin-bottom:8px">🛡️</div>
      <div style="font-size:16px;font-weight:700;color:#FF6B1A;margin-bottom:8px">ダブルガード発動</div>
      <div style="background:#FFF7ED;border:1px solid #FF6B1A;border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:13px">当初プラン: ${desiredDays}日</div>
        <div style="font-size:18px;font-weight:700;color:#FF6B1A;margin:4px 0">→ ${adjustedDays}日に安全調整</div>
        <div style="font-size:11px;color:#64748B">BMR/下限を下回らない安全ラインに自動延長</div>
      </div>
      ${aiMsg(desiredDays+'日だと少し無理しすぎかも！筋肉が落ちてリバウンドしやすくなるので、'+adjustedDays+'日に調整しておきました！')}
    ` : ''}
    <div style="font-size:14px;font-weight:700;margin-bottom:8px">あなたの目標カロリー</div>
    <div style="background:${guarded?'#FFF7ED':'#DCFCE7'};border:2px solid ${guarded?'#FF6B1A':'#16A34A'};border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="font-size:36px;font-weight:700;color:${guarded?'#FF6B1A':'#16A34A'};font-family:Georgia">${d.targetKcal.toLocaleString()}</div>
      <div style="font-size:14px;color:${guarded?'#FF6B1A':'#16A34A'}">kcal / 日</div>
    </div>
    <div style="background:#F1F5F9;border-radius:10px;padding:12px;margin-bottom:12px;text-align:left">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #E2E8F0">
        <div>
          <span style="font-size:13px;font-weight:700;color:#0891B2">BMR</span>
          <span style="font-size:11px;color:#64748B;margin-left:4px">基礎代謝量</span>
        </div>
        <span style="font-size:14px;font-weight:700">${d.bmr.toLocaleString()} kcal</span>
      </div>
      <div style="font-size:11px;color:#64748B;padding:4px 0 8px;line-height:1.6">
        <strong>基礎代謝量</strong>とは、寝ている間でも消費するカロリー。心臓を動かす・体温を維持する・呼吸するなど、生きているだけで消費する最低限のエネルギー量です。1日消費カロリーの約60〜70%を占める、最も重要な基準値。体重・身長・年齢・性別から算出されます。
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #E2E8F0">
        <div>
          <span style="font-size:13px;font-weight:700;color:#16A34A">TDEE</span>
          <span style="font-size:11px;color:#64748B;margin-left:4px">1日の総消費カロリー</span>
        </div>
        <span style="font-size:14px;font-weight:700">${d.tdee.toLocaleString()} kcal</span>
      </div>
      <div style="font-size:11px;color:#64748B;padding:4px 0 8px;line-height:1.6">
        <strong>TDEE（Total Daily Energy Expenditure）</strong>はBMR + 日常活動で消費するカロリー。この数値以内に抑えれば太らない、下回れば痩せる = ダイエットの基準ライン。計算式: <strong>TDEE = BMR × PAL</strong>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #E2E8F0">
        <div>
          <span style="font-size:13px;font-weight:700;color:#8B5CF6">PAL</span>
          <span style="font-size:11px;color:#64748B;margin-left:4px">身体活動レベル</span>
        </div>
        <span style="font-size:14px;font-weight:700">1.75（標準）</span>
      </div>
      <div style="font-size:11px;color:#64748B;padding:4px 0 8px;line-height:1.6">
        <strong>PAL（Physical Activity Level）</strong>は日常の活動量を示す係数。BMRに掛けることでTDEEを算出します。ずぼらんでは厚労省「日本人の食事摂取基準2025年版」の3段階を採用: <strong>低い=1.50（座位中心）／ ふつう=1.75（通勤・家事あり）／ 高い=2.00（活発な運動）</strong>。運動プラン選択時に調整されます。
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #E2E8F0">
        <div>
          <span style="font-size:13px;font-weight:700;color:#FF6B1A">1日赤字</span>
          <span style="font-size:11px;color:#64748B;margin-left:4px">消費−摂取の差</span>
        </div>
        <span style="font-size:14px;font-weight:700;color:#FF6B1A">-${d.tdee - d.targetKcal} kcal</span>
      </div>
      <div style="font-size:11px;color:#64748B;padding:4px 0 8px;line-height:1.6">
        TDEEから目標カロリーを引いた数値。この分だけ体脂肪からエネルギーを取り出す = 痩せる。<strong>体脂肪1kg = 7,200kcal</strong>で計算するので、例えば1日500kcal赤字なら約14日で1kg減の計算になります。
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0">
        <span style="font-size:13px;font-weight:700;color:#2563EB">達成予定</span>
        <span style="font-size:14px;font-weight:700">${adjustedDays}日</span>
      </div>
      <div style="font-size:11px;color:#64748B;padding:4px 0;line-height:1.5">
        月${((d.weight-d.goalWeight)/(adjustedDays/30)).toFixed(1)}kgペースで目標達成予定
      </div>
    </div>

    <div style="background:#EDE9FE;border:1px solid #7C3AED;border-radius:10px;padding:10px;margin-bottom:12px;text-align:left">
      <div style="font-size:12px;font-weight:700;color:#7C3AED;margin-bottom:4px">🇯🇵 Ganpule式の特徴</div>
      <div style="font-size:11px;color:#64748B;line-height:1.6">
        ずぼらんでは国立健康・栄養研究所が<strong>日本人成人137名の実測データ</strong>から算出した「Ganpule式」を採用。従来の「ハリス・ベネディクト式」（1919年の欧米人データ）より日本人に特化した<strong>精度が高い計算式</strong>です。
      </div>
    </div>

    <button class="btn btn-green" style="font-size:16px;padding:14px" onclick="goTo('S-013w')">この目標で始める</button>
  </div>`;
};
